<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilimlar Olami | 7-70 Yoshgacha</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --primary: #00d2ff;
            --accent: #6c5ce7;
            --dark-bg: #0a0a12;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Ubuntu', sans-serif; }

        body {
            background: var(--dark-bg);
            color: white;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a12 100%);
        }

        /* --- Kirish Animatsiyasi --- */
        #auth-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.8s ease-in-out;
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* --- Navbar --- */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0; z-index: 1000;
        }

        .stats-top {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }

        .stat-badge {
            padding: 5px 12px;
            border-radius: 50px;
            background: var(--glass);
            border: 1px solid var(--primary);
        }

        /* --- Main Layout --- */
        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
            padding: 40px 5%;
        }

        .book-card {
            background: var(--glass);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .book-card:hover {
            transform: scale(1.03) translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: var(--primary);
        }

        .delete-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s;
            cursor: pointer;
            z-index: 10;
        }

        .book-card:hover .delete-overlay { opacity: 1; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
        }

        button {
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-glow {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none; color: white; padding: 12px 25px;
            border-radius: 10px; font-weight: bold;
        }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(0,210,255,0.6); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card" data-aos="zoom-in">
            <i class="fas fa-user-graduate fa-3x" style="color: var(--primary); margin-bottom: 20px;"></i>
            <h2>Xush kelibsiz</h2>
            <p style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 20px;">Elektron pochtangizni kiriting</p>
            <input type="email" id="userEmail" placeholder="example@mail.com">
            <button class="btn-glow" style="width: 100%;" onclick="login()">Kirish</button>
        </div>
    </div>

    <nav class="hidden" id="main-nav">
        <div class="logo"><h2>BILIM<span style="color:var(--primary)">.UZ</span></h2></div>
        
        <div class="stats-top">
            <div class="stat-badge" id="schoolCount">Maktab: 0</div>
            <div class="stat-badge" id="uniCount">Talaba: 0</div>
            <div class="stat-badge" id="adultCount">70+: 0</div>
        </div>

        <div style="display: flex; align-items: center; gap: 15px;">
            <span id="displayUser" style="font-size: 0.8rem; color: var(--primary);"></span>
            <button onclick="logout()" style="background:none; border:none; color:white;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="container hidden" id="main-content">
        <div class="side-panel" data-aos="fade-right">
            <div class="auth-card" style="width: 100%;">
                <h3>Yangi Kitob</h3>
                <input type="text" id="title" placeholder="Kitob nomi...">
                <select id="userType">
                    <option value="school">Maktab o'quvchisi</option>
                    <option value="university">Talaba</option>
                    <option value="adult">7-70 yoshgacha</option>
                </select>
                <textarea id="summary" placeholder="Qisqacha mazmuni..." rows="4"></textarea>
                <button class="btn-glow" style="width: 100%;" onclick="saveBook()">Saqlash</button>
            </div>
        </div>

        <div class="content-panel">
            <div style="margin-bottom: 30px;">
                <input type="text" id="search" placeholder="🔍 Kitoblarni qidirish..." oninput="renderBooks()" style="border-radius: 50px; padding: 15px 25px;">
            </div>

            <div class="books-grid" id="booksGrid">
                </div>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init();

        let currentUser = localStorage.getItem('activeUser');

        // Kirish tekshiruvi
        if(currentUser) {
            showMain();
        }

        function login() {
            const email = document.getElementById('userEmail').value;
            if(email.includes('@')) {
                localStorage.setItem('activeUser', email);
                currentUser = email;
                showMain();
            } else {
                alert("Iltimos, to'g'ri email kiriting!");
            }
        }

        function showMain() {
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-nav').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('displayUser').innerText = currentUser;
                renderBooks();
            }, 800);
        }

        function logout() {
            localStorage.removeItem('activeUser');
            location.reload();
        }

        function saveBook() {
            const title = document.getElementById('title').value;
            const type = document.getElementById('userType').value;
            const summary = document.getElementById('summary').value;

            if(!title || !summary) return alert("To'ldiring!");
        }
        </script>
</body>
</html>
